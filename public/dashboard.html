<h1>Dashboard</h1>

<h2>Criar tarefa</h2>

<input id="tarefa" placeholder="Nova tarefa">
<button onclick="criarTarefa()">Criar</button>

<h2>Minhas tarefas</h2>
<ul id="lista"></ul>

<script>

const usuario = JSON.parse(localStorage.getItem("usuario"))

if(!usuario){
  window.location.href = "/login.html"
}

async function criarTarefa(){

 const texto = document.getElementById("tarefa").value

 const resposta = await fetch("/tasks",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify({
     texto,
     usuarioId: usuario.id
   })
 })

 if(resposta.ok){
   document.getElementById("tarefa").value = "" // limpa o input
   await carregarTarefas() // espera carregar
 }

}

 async function carregarTarefas(){

 const resposta = await fetch(`/tasks?usuarioId=${usuario.id}`)
 const tarefas = await resposta.json()

 const lista = document.getElementById("lista")
 lista.innerHTML = ""

 tarefas.forEach(tarefa => {
   lista.innerHTML += `<li>${tarefa.texto}</li>`
 })}



carregarTarefas()

</script>
