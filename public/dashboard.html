<h1>Dashboard</h1>


<h2>Criar tarefa</h2>

<input id="tarefa" placeholder="Nova tarefa">
<button onclick="criarTarefa()">Criar</button>
<button onclick="logout()">Logout</button> 


<h2>Minhas tarefas</h2>
<ul id="lista"></ul>

<script>

const usuario = JSON.parse(localStorage.getItem("usuario"))

if(!usuario){
  window.location.href = "/login.html"
}

//CRIAR TAREFAS
async function criarTarefa(){

 const texto = document.getElementById("tarefa").value

 const resposta = await fetch("/tasks",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify({
     texto,
     usuarioId: usuario.id
   })
 })

 document.getElementById("tarefa").value = ""

 if(resposta.ok){
   document.getElementById("tarefa").value = "" // limpa o input
   await carregarTarefas() // espera carregar
}

}


//CARREGAR TAREFAS
 async function carregarTarefas(){

 const resposta = await fetch(`/tasks?usuarioId=${usuario.id}`)
 const tarefas = await resposta.json()

 const lista = document.getElementById("lista")
 lista.innerHTML = ""

 tarefas.forEach(tarefa => {
   lista.innerHTML += `
<li>
  ${tarefa.texto}
  <button onclick="deletarTarefa(${tarefa.id})">❌</button>
  <button onclick="editarTarefa(${tarefa.id}, '${tarefa.texto}')">✏️</button>
</li>
`
 })}

//DELETAR TAREFAS
 async function deletarTarefa(id){
     await fetch(`/tasks/${id}`,{
        method:"DELETE"
    })
    carregarTarefas()
}


//LOGOUT
function logout(){
    localStorage.removeItem("usuario")
    window.location.href= "/login.html"
}

//EDITAR TAREFAS
async function editarTarefa(id, textoAtual){

 const novoTexto = prompt("Editar tarefa:", textoAtual)

 if(!novoTexto) return

 await fetch(`/tasks/${id}`,{
  method:"PUT",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify({
    texto: novoTexto
  })
 })

 carregarTarefas()

}

carregarTarefas()//PARA RETORNAR TODAS AS TAREFAS QUANDO LOGAR

</script>
